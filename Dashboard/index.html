<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0A0F1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Xëtu">
<meta name="description" content="Xëtu — Radar Bus Dem Dikk en temps réel à Dakar">
<title>Xëtu — Radar Bus Dakar</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- App styles -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── HEADER ── -->
<header id="app-header">
  <div class="logo">
    <div class="logo-icon">🚌</div>
    <div>
      <div class="logo-text">Xëtu</div>
      <div class="logo-sub">Radar Bus · Dakar</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      EN DIRECT
    </div>
    <div class="refresh-timer" id="timer">30s</div>
  </div>
</header>

<!-- ── STATS BAR ── -->
<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-icon">🚌</span>
    <div>
      <div class="stat-val" id="stat-bus">—</div>
      <div class="stat-label">Bus actifs</div>
    </div>
  </div>
  <div class="stat-item">
    <span class="stat-icon">📍</span>
    <div>
      <div class="stat-val" id="stat-sig">—</div>
      <div class="stat-label">Signalements / jour</div>
    </div>
  </div>
  <div class="stat-item">
    <span class="stat-icon">👥</span>
    <div>
      <div class="stat-val" id="stat-contrib">—</div>
      <div class="stat-label">Contributeurs</div>
    </div>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main">

  <!-- Carte -->
  <div id="map"></div>

  <!-- Sidebar desktop -->
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" data-tab="buses">🚌 Bus actifs</button>
      <button class="tab-btn" data-tab="leaderboard">🏆 Top signaleurs</button>
    </div>

    <div class="tab-content active" id="tab-buses">
      <div class="empty-state" id="buses-loading">
        <div class="empty-icon">⏳</div>
        <div class="empty-text">Chargement des bus...</div>
      </div>
    </div>

    <div class="tab-content" id="tab-leaderboard">
      <div class="empty-state" id="lb-loading">
        <div class="empty-icon">⏳</div>
        <div class="empty-text">Chargement...</div>
      </div>
    </div>

    <div class="bottom-cta">
      <button class="whatsapp-btn" id="btn-signal-main">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Signaler un bus
      </button>
    </div>
  </aside>
</div>

<!-- ── MOBILE BOTTOM PANEL ── -->
<div class="mobile-panel">
  <button class="whatsapp-btn" id="btn-signal-mobile">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Signaler un bus sur WhatsApp
  </button>
</div>

<!-- ── SCRIPTS ── -->
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
