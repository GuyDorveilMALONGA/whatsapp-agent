<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Xëtu — Radar bus Dem Dikk en temps réel à Dakar">
  <title>Xëtu — Radar Bus Dakar</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Styles Xëtu — mis en cache par le navigateur séparément du HTML -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a class="brand-logo" href="#">
      <div class="brand-logo__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 17h18M3 17l2-8h14l2 8M3 17v2h18v-2"
                stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="7.5"  cy="19.5" r="1.5" fill="#00C9B1"/>
          <circle cx="16.5" cy="19.5" r="1.5" fill="#00C9B1"/>
          <path d="M8 9h8M6 13h12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-logo__name">Xë<span>tu</span></div>
        <div class="brand-logo__tagline">Radar Bus · Dakar</div>
      </div>
    </a>
    <div class="header-controls">
      <div class="badge-live">
        <div class="badge-live__dot"></div>
        EN DIRECT
      </div>
      <div class="badge-timer" id="timer">30s</div>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-item__icon stat-item__icon--brand">🚌</div>
      <div>
        <div class="stat-item__value" id="stat-buses">—</div>
        <div class="stat-item__label">Bus actifs</div>
      </div>
    </div>
    <div class="stat-item">
      <div class="stat-item__icon stat-item__icon--secondary">📍</div>
      <div>
        <div class="stat-item__value" id="stat-today">—</div>
        <div class="stat-item__label">Signalements / jour</div>
      </div>
    </div>
    <div class="stat-item">
      <div class="stat-item__icon stat-item__icon--warning">👥</div>
      <div>
        <div class="stat-item__value" id="stat-contributors">—</div>
        <div class="stat-item__label">Contributeurs</div>
      </div>
    </div>
  </div>

  <!-- LAYOUT PRINCIPAL -->
  <div class="app-layout">

    <!-- CARTE -->
    <div class="map-wrapper">
      <div id="map"></div>
      <div class="map-loader" id="map-loader">
        <div class="map-loader__inner">
          <div class="map-loader__icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 17h18M3 17l2-8h14l2 8M3 17v2h18v-2"
                    stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="7.5"  cy="19.5" r="1.5" fill="#00C9B1"/>
              <circle cx="16.5" cy="19.5" r="1.5" fill="#00C9B1"/>
            </svg>
          </div>
          <div class="map-loader__text">Chargement de la carte…</div>
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar__scroll">

        <!-- Panel bus actifs -->
        <div class="panel">
          <div class="panel__header">
            <div class="panel__title">
              <div class="panel__title-icon panel__title-icon--brand">🚌</div>
              Bus actifs
            </div>
            <div class="panel__count panel__count--brand" id="bus-count">0</div>
          </div>
          <div class="line-filters" id="line-filters"></div>
          <div class="bus-list" id="bus-list">
            <div class="empty-state">
              <div class="empty-state__icon">⏳</div>
              <div class="empty-state__title">Chargement…</div>
            </div>
          </div>
        </div>

        <!-- Panel leaderboard -->
        <div class="panel">
          <div class="panel__header">
            <div class="panel__title">
              <div class="panel__title-icon panel__title-icon--secondary">🏆</div>
              Top Signaleurs
            </div>
            <div class="panel__count panel__count--secondary" id="leaderboard-count">0</div>
          </div>
          <div class="leaderboard-list" id="leaderboard-list">
            <div class="empty-state" style="padding:16px">
              <div class="empty-state__text">Chargement…</div>
            </div>
          </div>
        </div>

      </div>

      <!-- CTA WhatsApp -->
      <div class="cta-zone">
        <a class="cta-btn"
           href="https://wa.me/message/XETU"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="Signaler un bus sur WhatsApp">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          Signaler un bus
        </a>
      </div>
    </div>

  </div>

  <!-- TOASTS -->
  <div class="toast-container" id="toast-container" role="status" aria-live="polite"></div>

  <!-- Scripts — chargés en fin de body, ordre strict (dépendances d'abord) -->
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Modules Xëtu — mis en cache par le navigateur séparément -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
